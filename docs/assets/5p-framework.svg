<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The 5P Framework — Pause, Play, Push, Polish, Present. A practical framework for turning AI inputs into decision-ready outputs. By Stan Rogoz.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&amp;family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
    .display { font-family: 'Bricolage Grotesque', 'Inter', system-ui, sans-serif; }
    .body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
  <defs>
    <clipPath id="card"><rect x="22" y="22" width="1156" height="586" rx="18"/></clipPath>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#11264a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="630" fill="#dfe7f3"/>

  <!-- Card -->
  <rect x="22" y="22" width="1156" height="586" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <g clip-path="url(#card)">
    <!-- Tagline band -->
    <rect x="22" y="408" width="1156" height="200" fill="#eef3fb"/>
  </g>

  <!-- ===== Logo block ===== -->
  <text class="display" x="74" y="212" font-size="118" font-weight="800" letter-spacing="-5.5"><tspan fill="#11264a">5</tspan><tspan fill="#1f8ce6">P</tspan></text>
  <text class="body" x="76" y="248" font-size="19" font-weight="800" letter-spacing="7.2" fill="#11264a">FRAMEWORK</text>
  <rect x="76" y="262" width="140" height="2" fill="#1f8ce6"/>
  <text class="body" x="76" y="293" font-size="14" font-weight="800" letter-spacing="1.1" fill="#5a6b82">AI-AUGMENTED</text>
  <text class="body" x="76" y="314" font-size="14" font-weight="800" letter-spacing="1.1" fill="#5a6b82">DECISION-MAKING</text>

  <!-- Divider -->
  <rect x="312" y="112" width="2" height="208" fill="#e3e9f2"/>

  <!-- ===== Steps rail ===== -->
  <!-- Dotted connectors -->
  <g stroke="#e3e9f2" stroke-width="3" stroke-linecap="round" stroke-dasharray="0.1 9">
    <line x1="481" y1="194" x2="539" y2="194"/>
    <line x1="635" y1="194" x2="693" y2="194"/>
    <line x1="789" y1="194" x2="847" y2="194"/>
    <line x1="943" y1="194" x2="1001" y2="194"/>
  </g>

  <!-- Step 1: Pause -->
  <g>
    <circle cx="433" cy="130" r="12" fill="#6f2bb8"/>
    <text class="body" x="433" y="134.5" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
    <circle cx="433" cy="194" r="42" fill="#ffffff" stroke="#6f2bb8" stroke-width="4"/>
    <g transform="translate(413, 174) scale(1.6667)" fill="#6f2bb8">
      <rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/>
    </g>
    <text class="body" x="433" y="272" font-size="21" font-weight="800" fill="#6f2bb8" text-anchor="middle">PAUSE</text>
    <text class="body" x="433" y="298" font-size="14.5" fill="#5a6b82" text-anchor="middle">Plan objective,</text>
    <text class="body" x="433" y="318" font-size="14.5" fill="#5a6b82" text-anchor="middle">add context.</text>
  </g>

  <!-- Step 2: Play -->
  <g>
    <circle cx="587" cy="130" r="12" fill="#e8731c"/>
    <text class="body" x="587" y="134.5" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
    <circle cx="587" cy="194" r="42" fill="#ffffff" stroke="#e8731c" stroke-width="4"/>
    <g transform="translate(567, 174) scale(1.6667)" fill="none" stroke="#e8731c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.3 1 2.1V16h6v-.4c0-.8.4-1.5 1-2.1A6 6 0 0 0 12 3Z"/>
    </g>
    <text class="body" x="587" y="272" font-size="21" font-weight="800" fill="#e8731c" text-anchor="middle">PLAY</text>
    <text class="body" x="587" y="298" font-size="14.5" fill="#5a6b82" text-anchor="middle">Open up</text>
    <text class="body" x="587" y="318" font-size="14.5" fill="#5a6b82" text-anchor="middle">the space.</text>
  </g>

  <!-- Step 3: Push -->
  <g>
    <circle cx="741" cy="130" r="12" fill="#1f8a4c"/>
    <text class="body" x="741" y="134.5" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
    <circle cx="741" cy="194" r="42" fill="#ffffff" stroke="#1f8a4c" stroke-width="4"/>
    <g transform="translate(721, 174) scale(1.6667)" fill="none" stroke="#1f8a4c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v18M3 12h18"/><path d="M12 3l-3 3M12 3l3 3M12 21l-3-3M12 21l3-3M3 12l3-3M3 12l3 3M21 12l-3-3M21 12l-3 3"/>
    </g>
    <text class="body" x="741" y="272" font-size="21" font-weight="800" fill="#1f8a4c" text-anchor="middle">PUSH</text>
    <text class="body" x="741" y="298" font-size="14.5" fill="#5a6b82" text-anchor="middle">Challenge</text>
    <text class="body" x="741" y="318" font-size="14.5" fill="#5a6b82" text-anchor="middle">assumptions.</text>
  </g>

  <!-- Step 4: Polish -->
  <g>
    <circle cx="895" cy="130" r="12" fill="#1e83d4"/>
    <text class="body" x="895" y="134.5" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
    <circle cx="895" cy="194" r="42" fill="#ffffff" stroke="#1e83d4" stroke-width="4"/>
    <g transform="translate(875, 174) scale(1.6667)" fill="none" stroke="#1e83d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 3l5 5L8 21H3v-5L16 3Z"/><path d="M14 5l5 5"/>
    </g>
    <text class="body" x="895" y="272" font-size="21" font-weight="800" fill="#1e83d4" text-anchor="middle">POLISH</text>
    <text class="body" x="895" y="298" font-size="14.5" fill="#5a6b82" text-anchor="middle">Finalise</text>
    <text class="body" x="895" y="318" font-size="14.5" fill="#5a6b82" text-anchor="middle">the output.</text>
  </g>

  <!-- Step 5: Present -->
  <g>
    <circle cx="1049" cy="130" r="12" fill="#c0334e"/>
    <text class="body" x="1049" y="134.5" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">5</text>
    <circle cx="1049" cy="194" r="42" fill="#ffffff" stroke="#c0334e" stroke-width="4"/>
    <g transform="translate(1029, 174) scale(1.6667)" fill="none" stroke="#c0334e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 2.7-5 6-5s6 2 6 5"/><circle cx="17.5" cy="9.5" r="2.2"/><path d="M16 20c0-2.4 1.4-4 3.5-4 1 0 1.9.4 2.5 1"/>
    </g>
    <text class="body" x="1049" y="272" font-size="21" font-weight="800" fill="#c0334e" text-anchor="middle">PRESENT</text>
    <text class="body" x="1049" y="298" font-size="14.5" fill="#5a6b82" text-anchor="middle">Prepare for</text>
    <text class="body" x="1049" y="318" font-size="14.5" fill="#5a6b82" text-anchor="middle">scrutiny.</text>
  </g>

  <!-- ===== Tagline band content ===== -->
  <text class="display" x="600" y="478" font-size="33" font-weight="700" fill="#0c1c38" text-anchor="middle" letter-spacing="-0.3">A practical framework for turning</text>
  <text class="display" x="600" y="521" font-size="33" font-weight="700" text-anchor="middle" letter-spacing="-0.3"><tspan fill="#0c1c38">AI inputs into </tspan><tspan fill="#1f8ce6">decision-ready outputs.</tspan></text>
  <rect x="320" y="545" width="560" height="1" fill="#11264a" opacity="0.18"/>
  <text class="body" x="600" y="580" font-size="17" text-anchor="middle"><tspan fill="#5a6b82">Framework by </tspan><tspan fill="#11264a" font-weight="700">Stan Rogoz</tspan></text>
</svg>
